<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' http://localhost:8000 ws://localhost:8000">
  <title>WSGR GUI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ═══ 顶部导航栏 ═══ -->
  <nav class="nav-bar">
    <div class="nav-title">WSGR GUI</div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="main">主页</button>
      <button class="nav-tab" data-page="plan">方案预览</button>
      <button class="nav-tab" data-page="config">配置</button>
    </div>
  </nav>

  <!-- ═══ 页面容器 ═══ -->
  <main class="page-container">

    <!-- 主页面 -->
    <section id="page-main" class="page active">
      <div class="main-layout">
        <!-- 左侧：状态 & 任务 -->
        <div class="main-left">
          <div class="status-row">
            <div class="status-card">
              <div class="status-indicator" id="status-dot"></div>
              <span id="status-text">未连接</span>
            </div>
            <div class="expedition-bar">
              <span>远征检查倒计时：</span>
              <span id="expedition-timer">--:--</span>
            </div>
          </div>

          <!-- 统一任务区域：空闲 / 队列 / 运行 合并 -->
          <div class="card" id="task-area-card">
            <div id="task-area-idle">
              <p class="idle-text">当前无运行任务</p>
              <div class="idle-actions">
                <button class="btn btn-primary" id="btn-import-plan">导入战斗方案 (.yaml)</button>
              </div>
            </div>
            <div id="task-area-queue" style="display:none">
              <div class="task-area-header">
                <h3>任务队列</h3>
                <div class="queue-actions">
                  <button class="btn btn-primary btn-small" id="btn-start-queue">开始执行</button>
                  <button class="btn btn-small" id="btn-clear-queue">清空队列</button>
                  <button class="btn btn-danger btn-small" id="btn-stop-task" style="display:none">停止</button>
                </div>
              </div>
              <div class="task-queue-list" id="task-queue-list"></div>
            </div>
          </div>

          <!-- 任务组 -->
          <div class="card task-group-card" id="task-group-card">
            <div class="task-group-header">
              <h3>任务列表</h3>
              <div class="task-group-selector">
                <select class="input input-sm" id="task-group-select"></select>
                <button class="btn btn-small tg-icon-btn" id="btn-tg-new" title="新建组">
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z"/></svg>
                </button>
                <button class="btn btn-small tg-icon-btn" id="btn-tg-rename" title="重命名">
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M12.146.854a.5.5 0 0 1 .708 0l2.292 2.292a.5.5 0 0 1 0 .708l-9.5 9.5a.5.5 0 0 1-.168.11l-4 1.5a.5.5 0 0 1-.632-.632l1.5-4a.5.5 0 0 1 .11-.168l9.5-9.5zM11.207 2L2 11.207l-.94 2.507.466.466 2.507-.94L13.207 4.067 11.207 2z"/></svg>
                </button>
                <button class="btn btn-small btn-danger tg-icon-btn" id="btn-tg-delete" title="删除组">
                  <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H5.5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1h2a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                </button>
              </div>
            </div>
            <div class="task-group-items" id="task-group-items">
              <p class="tg-empty">暂无任务条目，导入方案后点击「加入任务组」添加</p>
            </div>
            <div class="task-group-actions">
              <button class="btn btn-primary btn-small" id="btn-tg-load-all">全部加入队列</button>
              <button class="btn btn-small" id="btn-tg-add-file">从文件添加</button>
            </div>
          </div>


        </div>

        <!-- 右侧：日志 -->
        <div class="main-right">
          <div class="card log-card">
            <div class="log-header">
              <h3>日志</h3>
              <div class="log-filters" id="log-filters">
                <button class="log-filter-btn active" data-level="debug" title="调试">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 1a.5.5 0 0 0-.5.5v1.02a4.5 4.5 0 0 0-1.87 1.16L.94 2.94a.5.5 0 1 0-.38.92l1.2.5A4.5 4.5 0 0 0 1.5 5.5H.5a.5.5 0 0 0 0 1h1.05a4.5 4.5 0 0 0 .55 1.53l-1.16.48a.5.5 0 1 0 .38.92l1.19-.49a4.5 4.5 0 0 0 1.99 1.56v.5a.5.5 0 0 0 1 0v-.16A4.5 4.5 0 0 0 8 11.5a4.5 4.5 0 0 0 2-.44v.44a.5.5 0 0 0 1 0v-.78a4.5 4.5 0 0 0 1.69-1.28l1.19.49a.5.5 0 1 0 .38-.92l-1.16-.48A4.5 4.5 0 0 0 13.5 7h.5a.5.5 0 0 0 0-1h-1a4.5 4.5 0 0 0-.26-1.14l1.2-.5a.5.5 0 1 0-.38-.92l-1.19.74A4.5 4.5 0 0 0 11 2.52V1.5a.5.5 0 0 0-1 0v.68A4.5 4.5 0 0 0 8 1.5a4.5 4.5 0 0 0-2 .68V1.5a.5.5 0 0 0-.5-.5zM8 3a3.5 3.5 0 0 1 3.5 3.5v1A3.5 3.5 0 0 1 8 11a3.5 3.5 0 0 1-3.5-3.5v-1A3.5 3.5 0 0 1 8 3z"/></svg>
                  <span class="log-filter-label">调试</span>
                  <span class="log-filter-count" id="log-count-debug">0</span>
                </button>
                <button class="log-filter-btn active" data-level="info" title="信息">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 1a6 6 0 1 1 0 12A6 6 0 0 1 8 2zm0 3a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5zM7 7.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5v3.5h.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1 0-1H8V8h-.5a.5.5 0 0 1-.5-.5z"/></svg>
                  <span class="log-filter-label">信息</span>
                  <span class="log-filter-count" id="log-count-info">0</span>
                </button>
                <button class="log-filter-btn active" data-level="warning" title="警告">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M7.134 1.503a1 1 0 0 1 1.732 0l6 10.392A1 1 0 0 1 14 13.5H2a1 1 0 0 1-.866-1.5l6-10.497zM8 4.5a.5.5 0 0 0-.5.5v3.5a.5.5 0 0 0 1 0V5a.5.5 0 0 0-.5-.5zm0 6a.625.625 0 1 0 0 1.25.625.625 0 0 0 0-1.25z"/></svg>
                  <span class="log-filter-label">警告</span>
                  <span class="log-filter-count" id="log-count-warning">0</span>
                </button>
                <button class="log-filter-btn active" data-level="error" title="错误">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 1a6 6 0 1 1 0 12A6 6 0 0 1 8 2zm2.354 3.146a.5.5 0 0 1 0 .708L8.707 8l1.647 1.646a.5.5 0 0 1-.708.708L8 8.707l-1.646 1.647a.5.5 0 0 1-.708-.708L7.293 8 5.646 6.354a.5.5 0 0 1 .708-.708L8 7.293l1.646-1.647a.5.5 0 0 1 .708 0z"/></svg>
                  <span class="log-filter-label">错误</span>
                  <span class="log-filter-count" id="log-count-error">0</span>
                </button>
              </div>
            </div>
            <div class="log-container" id="log-container"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 方案预览页面 -->
    <section id="page-plan" class="page">
      <div id="plan-empty" class="empty-state">
        <p>尚未导入方案</p>
        <div class="empty-state-actions">
          <button class="btn btn-primary" id="btn-import-plan-2">选择 yaml 文件</button>
          <button class="btn" id="btn-new-plan">新建方案</button>
        </div>
        <p class="plans-dir-hint">内置方案目录：<span id="plans-dir-hint" class="hint-path">加载中…</span></p>
        <button class="btn btn-small btn-link" id="btn-open-plans-dir">打开方案文件夹</button>
      </div>

      <!-- 新建方案：选择地图对话框 -->
      <div id="new-plan-dialog" class="modal-overlay" style="display:none">
        <div class="modal card">
          <h3>新建方案 — 选择地图</h3>
          <div class="form-group">
            <label>海域</label>
            <select id="new-plan-chapter" class="input">
              <option value="1">第 1 章</option>
              <option value="2">第 2 章</option>
              <option value="3">第 3 章</option>
              <option value="4">第 4 章</option>
              <option value="5">第 5 章</option>
              <option value="6">第 6 章</option>
              <option value="7">第 7 章</option>
              <option value="8">第 8 章</option>
              <option value="9">第 9 章</option>
              <option value="Ex">Ex 系列</option>
            </select>
          </div>
          <div class="form-group" id="new-plan-map-group">
            <label>地图</label>
            <select id="new-plan-map" class="input">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
            </select>
          </div>
          <div class="modal-actions">
            <button class="btn btn-primary" id="btn-new-plan-confirm">确定</button>
            <button class="btn" id="btn-new-plan-cancel">取消</button>
          </div>
        </div>
      </div>

      <div id="plan-detail" class="plan-layout" style="display:none">
        <!-- 左列：方案信息 + 节点编辑 + 操作 -->
        <div class="plan-left">
          <div class="card plan-header">
            <div class="plan-header-top">
              <h2 id="plan-map-name"></h2>
              <button class="btn btn-small btn-close-plan" id="btn-close-plan" title="关闭方案">✕</button>
            </div>
            <span class="badge" id="plan-file-name"></span>
            <div class="plan-meta">
              <label class="plan-meta-item">修理策略：
                <select id="plan-edit-repair" class="input input-inline">
                  <option value="1">中破就修</option>
                  <option value="2">大破才修</option>
                </select>
              </label>
              <label class="plan-meta-item">战况：
                <select id="plan-edit-fight-cond" class="input input-inline">
                  <option value="1">稳步前进</option>
                  <option value="2">火力万岁</option>
                  <option value="3">全力以赴</option>
                  <option value="4">深入敌阵</option>
                  <option value="5">以退为进</option>
                </select>
              </label>
              <label class="plan-meta-item">编队：
                <select id="plan-edit-fleet" class="input input-inline">
                  <option value="1">第 1 舰队</option>
                  <option value="2">第 2 舰队</option>
                  <option value="3">第 3 舰队</option>
                  <option value="4">第 4 舰队</option>
                </select>
              </label>
            </div>
            <p class="plan-comment" id="plan-comment"></p>
          </div>

          <!-- 节点详细设置（可滚动区域） -->
          <div class="plan-editor-area">
            <div id="node-editor-placeholder" class="card node-editor-placeholder">
              <p>点击右侧地图节点查看/编辑设置</p>
            </div>
            <div id="node-info" class="card node-info" style="display:none"></div>
            <div id="node-editor" class="card node-editor" style="display:none">
              <div class="node-editor-header">
                <div class="node-info-badge"></div>
                <div class="node-editor-title">
                  <h3>节点 <span id="node-editor-id"></span></h3>
                  <span class="node-editor-type"></span>
                </div>
                <button class="btn btn-small" id="btn-node-editor-close">✕</button>
              </div>
              <div class="form-group">
                <label>阵型</label>
                <select id="node-edit-formation" class="input">
                  <option value="1">单纵阵</option>
                  <option value="2">复纵阵</option>
                  <option value="3">轮型阵</option>
                  <option value="4">梯形阵</option>
                  <option value="5">单横阵</option>
                </select>
              </div>
              <div class="form-group form-row">
                <label><input type="checkbox" id="node-edit-proceed" checked> 前进</label>
                <label><input type="checkbox" id="node-edit-night"> 夜战</label>
              </div>
              <div class="form-group">
                <label>索敌规则</label>
                <textarea id="node-edit-rules" class="input node-rules-textarea" rows="2"
                  placeholder="每行一条，如: DD + CL <= 1, 4"></textarea>
              </div>
              <button class="btn btn-primary btn-small" id="btn-node-edit-save">应用</button>
            </div>
          </div>

          <div class="plan-actions">
            <button class="btn btn-primary btn-small" id="btn-execute-plan">加入队列</button>
            <button class="btn btn-small" id="btn-add-to-group">加入任务组</button>
            <button class="btn btn-small" id="btn-export-plan">导出 YAML</button>
            <label>
              次数：<input type="number" id="plan-times" value="1" min="1" max="99" class="input-small">
            </label>
          </div>
        </div>

        <!-- 右列：节点路线地图 -->
        <div class="plan-right">
          <h3>节点路线 <span style="font-size:12px;color:var(--text-muted);font-weight:normal">（点击节点可编辑）</span></h3>
          <div class="node-list" id="node-list"></div>
        </div>
      </div>
    </section>

    <!-- 配置页面 -->
    <section id="page-config" class="page">
      <div class="config-header">
        <h2 class="config-page-title">配置</h2>
        <div class="config-header-actions">
          <button class="btn btn-small btn-link" id="btn-open-config-dir">打开配置目录</button>
          <button class="btn btn-primary" id="btn-save-config">保存配置</button>
        </div>
      </div>
      <div class="config-grid">
      <div class="card">
        <h3>模拟器配置</h3>
        <div class="form-group">
          <label>模拟器类型</label>
          <select id="cfg-emu-type" class="input">
            <option value="雷电">雷电</option>
            <option value="蓝叠">蓝叠</option>
            <option value="MuMu">MuMu</option>
          </select>
        </div>
        <div class="form-group">
          <label>模拟器路径</label>
          <div class="input-row">
            <input type="text" id="cfg-emu-path" class="input" placeholder="留空自动检测">
            <button class="btn btn-small" id="btn-browse-emu">浏览</button>
          </div>
        </div>
        <div class="form-group">
          <label>ADB 端口 (serial)</label>
          <input type="text" id="cfg-emu-serial" class="input" placeholder="如 127.0.0.1:16384，留空自动检测">
        </div>
      </div>

      <div class="card" style="display:none">
        <h3>游戏账号</h3>
        <div class="form-group">
          <label>渠道服</label>
          <select id="cfg-game-app" class="input">
            <option value="官服">官服</option>
            <option value="小米服">小米服</option>
            <option value="应用宝服">应用宝服</option>
          </select>
        </div>
      </div>

      <div class="card">
        <h3>日常自动化</h3>
        <div class="form-group">
          <label><input type="checkbox" id="cfg-auto-expedition" checked> 自动远征</label>
        </div>
        <div class="form-group">
          <label>远征检查间隔（分钟）</label>
          <input type="number" id="cfg-expedition-interval" class="input" min="1" max="120" value="15">
        </div>

        <hr class="card-divider">

        <div class="form-group">
          <label><input type="checkbox" id="cfg-auto-battle"> 自动战役</label>
        </div>
        <div class="form-group">
          <label>战役类型</label>
          <select id="cfg-battle-type" class="input">
            <option value="困难潜艇">困难潜艇</option>
            <option value="困难航母">困难航母</option>
            <option value="困难驱逐">困难驱逐</option>
            <option value="困难巡洋">困难巡洋</option>
            <option value="困难战列">困难战列</option>
            <option value="简单航母">简单航母</option>
            <option value="简单潜艇">简单潜艇</option>
            <option value="简单驱逐">简单驱逐</option>
            <option value="简单巡洋">简单巡洋</option>
            <option value="简单战列">简单战列</option>
          </select>
        </div>
        <div class="form-group">
          <label>战役次数</label>
          <input type="number" id="cfg-battle-times" class="input" min="1" max="10" value="3">
        </div>

        <hr class="card-divider">

        <div class="form-group">
          <label><input type="checkbox" id="cfg-auto-exercise"> 自动演习</label>
        </div>
        <div class="form-group">
          <label>演习舰队</label>
          <select id="cfg-exercise-fleet" class="input">
            <option value="1">第 1 舰队</option>
            <option value="2">第 2 舰队</option>
            <option value="3">第 3 舰队</option>
            <option value="4">第 4 舰队</option>
          </select>
        </div>
      </div>

      <div class="card">
        <h3>界面设置</h3>
        <div class="form-group">
          <label>颜色主题</label>
          <select id="cfg-theme-mode" class="input">
            <option value="dark">暗色</option>
            <option value="light">浅色</option>
            <option value="system">跟随系统</option>
          </select>
        </div>
        <div class="form-group">
          <label>主色调</label>
          <div class="input-row" style="align-items:center">
            <input type="color" id="cfg-accent-color" value="#0f7dff" class="color-picker">
            <span id="cfg-accent-label" class="accent-label">#0f7dff</span>
            <button class="btn btn-small" id="btn-reset-accent">重置</button>
          </div>
        </div>

        <hr class="card-divider">

        <div class="form-group">
          <label><input type="checkbox" id="cfg-debug-mode"> 调试模式（显示全部日志）</label>
        </div>
      </div>

      </div>
    </section>

  </main>

  <!-- 通用输入对话框 -->
  <div id="generic-prompt" class="modal-overlay" style="display:none">
    <div class="modal card">
      <h3 id="generic-prompt-title">提示</h3>
      <p id="generic-prompt-message" style="margin:0 0 12px;font-size:13px;color:var(--text-secondary)"></p>
      <input id="generic-prompt-input" class="input" style="display:none" />
      <div class="modal-actions">
        <button class="btn btn-primary" id="generic-prompt-ok">确定</button>
        <button class="btn" id="generic-prompt-cancel">取消</button>
      </div>
    </div>
  </div>

  <script src="../../dist/renderer.bundle.js"></script>
</body>
</html>
